<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast Graph</title>
<style>
    :root {
        --color-up: #0bd3d4;
        --color-down: #6b7280;
        --bar-height: 256px;
        --bar-width: 90px;
        --gap: 3rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: sans-serif;
        padding: 1rem;
    }

    .card {
        width: min(95vw, 600px);
        padding: 1.5rem;
        border-radius: 0.75rem;
        background: rgba(255,255,255,0.08);
    }

    h3 {
        color: #fff;
        font-size: 1.125rem;
        text-align: center;
        margin-bottom: 2rem;
    }

    .chart-outer {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 0.5rem;
    }

    .axis {
        height: var(--bar-height);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        font-size: 1rem;
        color: #fff;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .chart-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .zero-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        background: #fff;
        top: calc(var(--bar-height) / 2);
        z-index: 2;
        pointer-events: none;
    }

    .bars-row {
        display: flex;
        flex-direction: row;
        justify-content: center;
        gap: var(--gap);
        width: 100%;
    }

    .bar-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: var(--bar-width);
        flex-shrink: 0;
    }

    .pill {
        position: relative;
        width: var(--bar-width);
        height: var(--bar-height);
        background: #374151;
        border-radius: 9999px;
        overflow: hidden;
        flex-shrink: 0;
    }

    .pill-fill {
        position: absolute;
        left: 0;
        right: 0;
    }

    .bar-label {
        margin-top: 0.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #fff;
        gap: 0.1rem;
    }
    .bar-label .week   { font-size: 1rem; text-align: center; white-space: nowrap; }
    .bar-label .likely { font-size: 0.875rem; font-weight: 700; }
    .bar-label .pct    { font-size: 0.75rem; }

    /* @media (max-width: 640px) {
        :root { --bar-height: 192px; --bar-width: 60px; --gap: 1rem; }
        .axis  { font-size: 0.6rem; }
        h3     { font-size: 1rem; }
        .bar-label .week   { font-size: 0.65rem; }
        .bar-label .likely { font-size: 0.75rem; }
        .bar-label .pct    { font-size: 0.65rem; }
    }

    @media (max-width: 420px) {
        :root { --bar-height: 140px; --bar-width: 44px; --gap: 0.6rem; }
        .axis  { font-size: 0.52rem; }
        h3     { font-size: 0.9rem; margin-bottom: 1.25rem; }
        .bar-label .week   { font-size: 0.6rem; }
        .bar-label .likely { font-size: 0.7rem; }
        .bar-label .pct    { font-size: 0.6rem; }
    } */
</style>
</head>
<body>

<div id="graph-root"></div>

<script>
    function getWeekRange(weekOffset) {
        const now = new Date();
        // Find the most recent Saturday (day 6)
        const day = now.getDay(); // 0=Sun, 6=Sat
        const daysToLastSat = (day === 6) ? 0 : (day + 1);
        const thisSat = new Date(now);
        thisSat.setDate(now.getDate() - daysToLastSat + (weekOffset * 7));
        const thisSun = new Date(thisSat);
        thisSun.setDate(thisSat.getDate() + 6); // Sat + 6 = following Sunday

        const fmt = d => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
        return `${fmt(thisSat)} - ${fmt(thisSun)}`;
    }

    function renderGraph(rawForecasts) {
        const forecasts = rawForecasts.map((item, i) => ({
            week:       getWeekRange(i),
            isUp:       item.Likeliness === "Likely",
            confidence: Number(Number(item.CI).toFixed(2)),
        }));

        const axisLabels = ["Likely", "50%", "0%", "-50%", "Unlikely"];
        const axisHTML   = axisLabels.map(l => `<span>${l}</span>`).join("");

        const barsHTML = forecasts.map(f => {
            const barHeightPct = f.confidence / 2;
            const fillStyle    = f.isUp
                ? `bottom:50%; height:${barHeightPct}%; background:var(--color-up);`
                : `top:50%;    height:${barHeightPct}%; background:var(--color-down);`;

            return `
                <div class="bar-col">
                    <div class="pill">
                        <div class="pill-fill" style="${fillStyle}"></div>
                    </div>
                    <div class="bar-label">
                        <span class="week">${f.week}</span>
                        <span class="likely">${f.isUp ? "Likely" : "Unlikely"}</span>
                        <span class="pct">${f.isUp ? "+" : "-"}${f.confidence}%</span>
                    </div>
                </div>`;
        }).join("");

        document.getElementById("graph-root").innerHTML = `
            <div class="card">
                <h3>3 Week Forecast Confidence</h3>
                <div class="chart-outer">
                    <div class="axis">${axisHTML}</div>
                    <div class="chart-area">
                        <div class="zero-line"></div>
                        <div class="bars-row">${barsHTML}</div>
                    </div>
                    <div class="axis">${axisHTML}</div>
                </div>
            </div>`;
    }

    function startRender(data) {
        try {
            renderGraph(data);
        } catch (e) {
            console.error("Render crash:", e);
        }
        window.renderDone = true;
    }
</script>

</body>
</html>
